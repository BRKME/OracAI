name: Public Channel

on:
  schedule:
    # Every hour (global cooldown 4h handles spam prevention)
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish (bypass triggers)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  public-channel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Public Channel Publisher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PUBLIC_CHANNEL_ID: ${{ secrets.TELEGRAM_PUBLIC_CHANNEL_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python public_channel.py --force
          else
            python public_channel.py
          fi
      
      - name: Commit state
        run: |
          git config user.name "oracai-bot"
          git config user.email "bot@oracai.local"
          git add state/ || true
          git diff --cached --quiet || git commit -m "public: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || true
