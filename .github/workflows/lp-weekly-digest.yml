name: LP Weekly Digest

on:
  schedule:
    - cron: '0 10 * * 0'  # Sunday 10:00 UTC = 13:00 MSK
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python lp_weekly_digest.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Commit state
        run: |
          git config user.name "lp-bot"
          git config user.email "bot@lp-system.local"
          git add state/ || true
          git diff --cached --quiet || git commit -m "weekly: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || true
