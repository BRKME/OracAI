name: Regime Check

on:
  schedule:
    # Цель доставки: 07:40 MSK (04:40 UTC). Но GitHub Actions free-tier для
    # ЭТОГО воркфлоу стабильно задерживает запуск на 245-312 мин (~4.5ч, замер
    # по истории 10-15.06 — 02:30 UTC слот попадал в пик нагрузки раннеров).
    # Ставим крон на 00:10 UTC: 00:10 + ~4.5ч задержки ≈ 04:40 UTC = 07:40 MSK.
    # Разброс ±35 мин неустраним на free-tier (расписание Actions неточное).
    - cron: '10 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regime-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Regime Engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py
      
      - name: Commit state
        run: |
          git config user.name "regime-bot"
          git config user.email "bot@regime-engine.local"
          git add state/ || true
          git diff --cached --quiet || git commit -m "state: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || true
