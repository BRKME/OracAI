name: Cycle Layer Log

# Автосбор данных cycle-слоя в state/cycle_log.csv (одна строка в день).
# Ничего не публикует в бота. Это observation-фаза: копим ряд на живых данных.
# 02:45 UTC = после data_refresh (02:00) и regime_check (02:30),
# чтобы логгер видел свежие данные и свежий last_output.json движка.

on:
  schedule:
    - cron: '45 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cycle-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect cycle snapshot
        run: python cycle_logger.py

      - name: Commit log
        run: |
          git config user.name "cycle-bot"
          git config user.email "bot@cycle-layer.local"
          git add state/cycle_log.csv state/cycle_ladder.json || true
          git diff --cached --quiet || git commit -m "cycle_log: $(date -u +%Y-%m-%d)"
          git pull --rebase || true
          git push || true
