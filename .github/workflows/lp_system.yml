name: LP Intelligence System

on:
  schedule:
    # 05:00 MSK (02:00 UTC) — после regime_check, с запасом на задержку GH Actions
    - cron: '0 2 * * *'
    # 13:00 MSK (10:00 UTC)
    - cron: '0 10 * * *'
    # 15:30 MSK (12:30 UTC)
    - cron: '30 12 * * *'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lp-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run LP System
        env:
          ARB_RPC: ${{ secrets.ARB_RPC }}
          BSC_RPC: ${{ secrets.BSC_RPC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python lp_system.py
      
      - name: Commit state
        run: |
          git config user.name "lp-bot"
          git config user.email "bot@lp-system.local"
          git add state/ || true
          git diff --cached --quiet || git commit -m "LP: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || true
