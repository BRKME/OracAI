name: LP Intelligence System

on:
  schedule:
    # Every 2 hours. Script decides whether to actually send to Telegram:
    # - always sends if a position is out of range by >0.1%
    # - otherwise sends only around 7:00 and 19:00 MSK
    # Offset by 50 min to reduce GitHub Actions cron delay impact on the
    # scheduled-hour window check.
    - cron: '50 */2 * * *'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lp-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run LP System
        env:
          ARB_RPC: ${{ secrets.ARB_RPC }}
          BSC_RPC: ${{ secrets.BSC_RPC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
        run: python lp_system.py
      
      - name: Commit state
        run: |
          git config user.name "lp-bot"
          git config user.email "bot@lp-system.local"
          git add state/ || true
          git diff --cached --quiet || git commit -m "LP: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push || true
